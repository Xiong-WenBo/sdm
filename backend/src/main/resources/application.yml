spring:
  datasource:
    url: ${SDM_DATASOURCE_URL:jdbc:mysql://localhost:3306/sdm?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
    username: ${SDM_DATASOURCE_USERNAME:root}
    password: ${SDM_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.sdm.backend.entity
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${SDM_JWT_SECRET:change-this-secret-in-production-change-this-secret}
  expiration: ${SDM_JWT_EXPIRATION:86400000}

app:
  student:
    initial-password-fallback: ${SDM_STUDENT_INITIAL_PASSWORD_FALLBACK:123123}
