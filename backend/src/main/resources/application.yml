spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/sdm?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.sdm.backend.entity
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET:change-this-jwt-secret-in-production-please}
  expiration: ${JWT_EXPIRATION:86400000}
